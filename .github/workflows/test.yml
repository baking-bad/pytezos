name: Test
concurrency: 
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  push:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/test.yml'

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # latest
          - os: ubuntu-latest
            arch: amd64
            python-version: '3.13'
          - os: ubuntu-latest
            arch: arm64
            python-version: '3.13'
          # stable
          - os: ubuntu-latest
            arch: amd64
            python-version: '3.12'
          # oldest
          - os: ubuntu-latest
            arch: amd64
            python-version: '3.10'

          # FIXME: docker.errors.DockerException: Error while fetching server API version
          # - os: macos-latest
          #   arch: amd64
          # - os: macos-latest
          #   arch: arm64
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install binary dependencies
        run: OSTYPE=$OSTYPE make install-deps

      - name: Install project
        run: make install

      - name: Run lint
        run: make lint

      - name: Run tests
        run: OSTYPE=$OSTYPE make test-ci

      - name: Publish results
        uses: EnricoMi/publish-unit-test-result-action/composite@v2
        if: always()
        with:
          junit_files: "*.xml"
